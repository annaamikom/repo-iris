stages:
  preparation:
    cmd: python src/prepare.py
    deps:
    - data/raw/Iris.csv
    - src/prepare.py
    outs:
    - data/prepared/test.csv
    - data/prepared/train.csv
    - plots/data_distribution.png
  train:
    cmd: python src/train.py
    deps:
    - data/prepared/train.csv
    - src/train.py
    outs:
    - models/model.pkl
  evaluate:
    cmd: python src/evaluate.py
    deps:
      - data/prepared/test.csv
      - models/model.pkl
      - src/evaluate.py
    metrics:
      - metrics.json:
          cache: false